<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Tlias 员工管理系统</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #app { height: 100%; }

  .logo {
    height: 60px;
    line-height: 60px;
    text-align: center;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    background: #001529;
    letter-spacing: 2px;
  }

  .el-header {
    background: #fff;
    border-bottom: 1px solid #e4e7ed;
    display: flex;
    align-items: center;
    font-size: 16px;
    font-weight: 600;
    color: #303133;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .el-aside {
    background: #001529;
    overflow: hidden;
  }

  .el-aside .el-menu {
    border-right: none;
  }

  .el-main {
    background: #f0f2f5;
    padding: 20px;
  }

  .page-title {
    font-size: 16px;
    font-weight: 600;
    color: #303133;
  }

  .search-form {
    background: #fff;
    padding: 20px;
    border-radius: 4px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }

  .table-container {
    background: #fff;
    padding: 16px;
    border-radius: 4px;
  }

  .table-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .dashboard-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }

  .dashboard-card {
    background: #fff;
    border-radius: 4px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .dashboard-card .icon {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #fff;
  }

  .dashboard-card .info .num {
    font-size: 28px;
    font-weight: 700;
    color: #303133;
  }

  .dashboard-card .info .label {
    font-size: 14px;
    color: #909399;
    margin-top: 4px;
  }

  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .chart-box {
    background: #fff;
    border-radius: 4px;
    padding: 16px;
  }

  .chart-box h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #303133;
  }

  .chart-box .chart {
    height: 320px;
  }

  .expr-item {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .expr-item .el-form-item {
    margin-bottom: 0;
  }

  .avatar-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }

  .avatar-uploader {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar-preview {
    width: 60px;
    height: 60px;
    border-radius: 4px;
    object-fit: cover;
    border: 1px solid #dcdfe6;
  }

  @media (max-width: 768px) {
    .charts-row { grid-template-columns: 1fr; }
    .el-aside { width: 180px !important; }
  }
</style>
</head>
<body>

<div id="app">
  <el-container style="height: 100vh">
    <el-aside width="220px">
      <div class="logo">Tlias 管理系统</div>
      <el-menu
        :default-active="activeMenu"
        background-color="#001529"
        text-color="#fff"
        active-text-color="#409eff"
        @select="handleMenuSelect"
      >
        <el-menu-item index="dashboard">
          <span>📊 数据统计</span>
        </el-menu-item>
        <el-menu-item index="emp">
          <span>👥 员工管理</span>
        </el-menu-item>
        <el-menu-item index="dept">
          <span>🏢 部门管理</span>
        </el-menu-item>
      </el-menu>
    </el-aside>

    <el-container>
      <el-header>
        <span class="page-title">{{ pageTitle }}</span>
      </el-header>

      <el-main>
        <!-- ============ 仪表盘 ============ -->
        <div v-show="currentView === 'dashboard'">
          <div class="dashboard-cards">
            <div class="dashboard-card">
              <div class="icon" style="background:#409eff">👥</div>
              <div class="info">
                <div class="num">{{ dashboardData.empTotal }}</div>
                <div class="label">员工总数</div>
              </div>
            </div>
            <div class="dashboard-card">
              <div class="icon" style="background:#67c23a">🏢</div>
              <div class="info">
                <div class="num">{{ dashboardData.deptTotal }}</div>
                <div class="label">部门总数</div>
              </div>
            </div>
          </div>
          <div class="charts-row">
            <div class="chart-box">
              <h3>员工性别分布</h3>
              <div id="genderChart" class="chart"></div>
            </div>
            <div class="chart-box">
              <h3>员工职位分布</h3>
              <div id="jobChart" class="chart"></div>
            </div>
          </div>
        </div>

        <!-- ============ 员工管理 ============ -->
        <div v-show="currentView === 'emp'">
          <div class="search-form">
            <el-input v-model="empQuery.name" placeholder="姓名" clearable style="width:180px" size="default" />
            <el-select v-model="empQuery.gender" placeholder="性别" clearable style="width:130px" size="default">
              <el-option label="男" :value="1" />
              <el-option label="女" :value="2" />
            </el-select>
            <el-date-picker v-model="empQuery.begin" type="date" placeholder="入职开始" value-format="yyyy-MM-dd" style="width:160px" size="default" />
            <el-date-picker v-model="empQuery.end" type="date" placeholder="入职结束" value-format="yyyy-MM-dd" style="width:160px" size="default" />
            <el-button type="primary" @click="searchEmp">搜索</el-button>
            <el-button @click="resetEmpSearch">重置</el-button>
          </div>

          <div class="table-container">
            <div class="table-toolbar">
              <span style="font-size:15px;font-weight:600">员工列表</span>
              <el-button type="primary" @click="openEmpDialog()">+ 新增员工</el-button>
            </div>
            <el-table :data="empList" stripe border style="width:100%" v-loading="empLoading">
              <el-table-column type="index" label="#" width="45" />
              <el-table-column prop="name" label="姓名" />
              <el-table-column label="性别">
                <template #default="{ row }">{{ row.gender === 1 ? '男' : '女' }}</template>
              </el-table-column>
              <el-table-column label="头像">
                <template #default="{ row }">
                  <img v-if="row.image" :src="row.image" class="avatar-img" />
                  <span v-else style="color:#999">无</span>
                </template>
              </el-table-column>
              <el-table-column prop="phone" label="手机号" />
              <el-table-column label="职位">
                <template #default="{ row }">{{ jobMap[row.job] || '其他' }}</template>
              </el-table-column>
              <el-table-column prop="salary" label="薪资" />
              <el-table-column prop="entryDate" label="入职日期" />
              <el-table-column prop="deptName" label="部门" />
              <el-table-column label="操作" width="120" fixed="right">
                <template #default="{ row }">
                  <el-button size="small" type="primary" link @click="openEmpDialog(row)">编辑</el-button>
                  <el-button size="small" type="danger" link @click="deleteEmp(row.id)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
            <div style="margin-top:16px;display:flex;justify-content:flex-end">
              <el-pagination
                v-model:current-page="empQuery.page"
                v-model:page-size="empQuery.pageSize"
                :page-sizes="[5, 10, 20, 50]"
                :total="empTotal"
                layout="total, sizes, prev, pager, next"
                @size-change="loadEmp"
                @current-change="loadEmp"
              />
            </div>
          </div>
        </div>

        <!-- ============ 部门管理 ============ -->
        <div v-show="currentView === 'dept'">
          <div class="table-container">
            <div class="table-toolbar">
              <span style="font-size:15px;font-weight:600">部门列表</span>
              <el-button type="primary" @click="openDeptDialog()">+ 新增部门</el-button>
            </div>
            <el-table :data="deptList" stripe border style="width:100%" v-loading="deptLoading">
              <el-table-column type="index" label="#" width="60" />
              <el-table-column prop="name" label="部门名称" min-width="200" />
              <el-table-column prop="createTime" label="创建时间" min-width="180" />
              <el-table-column prop="updateTime" label="修改时间" min-width="180" />
              <el-table-column label="操作" width="150">
                <template #default="{ row }">
                  <el-button size="small" type="primary" link @click="openDeptDialog(row)">编辑</el-button>
                  <el-button size="small" type="danger" link @click="deleteDept(row.id)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
          </div>
        </div>
      </el-main>
    </el-container>
  </el-container>

  <!-- ========== 员工编辑弹窗 ========== -->
  <el-dialog v-model="empDialogVisible" :title="empForm.id ? '编辑员工' : '新增员工'" width="700px" :close-on-click-modal="false">
    <el-form :model="empForm" label-width="100px" size="default">
      <el-row :gutter="20">
        <el-col :span="12">
          <el-form-item label="用户名" required>
            <el-input v-model="empForm.username" placeholder="用户名" />
          </el-form-item>
        </el-col>
        <el-col :span="12">
          <el-form-item label="姓名" required>
            <el-input v-model="empForm.name" placeholder="姓名" />
          </el-form-item>
        </el-col>
      </el-row>
      <el-row :gutter="20">
        <el-col :span="12">
          <el-form-item label="性别">
            <el-radio-group v-model="empForm.gender">
              <el-radio :value="1">男</el-radio>
              <el-radio :value="2">女</el-radio>
            </el-radio-group>
          </el-form-item>
        </el-col>
        <el-col :span="12">
          <el-form-item label="手机号">
            <el-input v-model="empForm.phone" placeholder="手机号" />
          </el-form-item>
        </el-col>
      </el-row>
      <el-row :gutter="20">
        <el-col :span="12">
          <el-form-item label="职位">
            <el-select v-model="empForm.job" placeholder="请选择" style="width:100%">
              <el-option v-for="(v,k) in jobMap" :key="k" :label="v" :value="Number(k)" />
            </el-select>
          </el-form-item>
        </el-col>
        <el-col :span="12">
          <el-form-item label="薪资">
            <el-input-number v-model="empForm.salary" :min="0" :step="1000" style="width:100%" />
          </el-form-item>
        </el-col>
      </el-row>
      <el-row :gutter="20">
        <el-col :span="12">
          <el-form-item label="入职日期">
            <el-date-picker v-model="empForm.entryDate" type="date" placeholder="选择日期" style="width:100%" value-format="YYYY-MM-DD" />
          </el-form-item>
        </el-col>
        <el-col :span="12">
          <el-form-item label="所属部门">
            <el-select v-model="empForm.deptId" placeholder="请选择" style="width:100%">
              <el-option v-for="d in deptList" :key="d.id" :label="d.name" :value="d.id" />
            </el-select>
          </el-form-item>
        </el-col>
      </el-row>
      <el-form-item label="头像">
        <div class="avatar-uploader">
          <el-upload action="/upload" :show-file-list="false" :on-success="handleUploadSuccess">
            <el-button size="small" type="primary">上传头像</el-button>
          </el-upload>
          <img v-if="empForm.image" :src="empForm.image" class="avatar-preview" />
        </div>
      </el-form-item>
      <el-divider content-position="left">工作经历</el-divider>
      <div v-for="(expr, idx) in empForm.exprList" :key="idx" class="expr-item">
        <el-form-item label="公司" style="width:180px">
          <el-input v-model="expr.company" placeholder="公司名称" size="small" />
        </el-form-item>
        <el-form-item label="职位" style="width:140px">
          <el-input v-model="expr.job" placeholder="职位" size="small" />
        </el-form-item>
        <el-form-item label="开始" style="width:140px">
          <el-date-picker v-model="expr.begin" type="date" placeholder="开始" size="small" style="width:100%" value-format="YYYY-MM-DD" />
        </el-form-item>
        <el-form-item label="结束" style="width:140px">
          <el-date-picker v-model="expr.end" type="date" placeholder="结束" size="small" style="width:100%" value-format="YYYY-MM-DD" />
        </el-form-item>
        <el-button type="danger" size="small" circle @click="empForm.exprList.splice(idx,1)">×</el-button>
      </div>
      <el-button type="warning" plain size="small" @click="addExpr" style="margin-left:100px">+ 添加工作经历</el-button>
    </el-form>
    <template #footer>
      <el-button @click="empDialogVisible=false">取消</el-button>
      <el-button type="primary" @click="saveEmp" :loading="empSaving">保存</el-button>
    </template>
  </el-dialog>

  <!-- ========== 部门编辑弹窗 ========== -->
  <el-dialog v-model="deptDialogVisible" :title="deptForm.id ? '编辑部门' : '新增部门'" width="420px" :close-on-click-modal="false">
    <el-form :model="deptForm" label-width="80px">
      <el-form-item label="部门名称" required>
        <el-input v-model="deptForm.name" placeholder="请输入部门名称" />
      </el-form-item>
    </el-form>
    <template #footer>
      <el-button @click="deptDialogVisible=false">取消</el-button>
      <el-button type="primary" @click="saveDept" :loading="deptSaving">保存</el-button>
    </template>
  </el-dialog>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/echarts@5/dist/echarts.min.js"></script>
<script>
const { createApp, ref, reactive, computed, onMounted, watch, nextTick } = Vue;

const BASE = ''; // 同域下API不需要前缀

const app = createApp({
  setup() {
    // ===================== 路由状态 =====================
    const currentView = ref('dashboard');
    const activeMenu = ref('dashboard');
    const pageTitle = computed(() => ({
      dashboard: '数据统计',
      emp: '员工管理',
      dept: '部门管理'
    }[currentView.value] || ''));

    function handleMenuSelect(idx) {
      currentView.value = idx;
      activeMenu.value = idx;
    }

    // ===================== 通用工具 =====================
    const jobMap = { 1: '班主任', 2: '讲师', 3: '学工主管', 4: '教研主管', 5: '咨询师' };

    function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, '0');
      const day = String(dt.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    // ===================== 仪表盘 =====================
    const dashboardData = reactive({ empTotal: 0, deptTotal: 0 });
    let genderChartInstance = null;
    let jobChartInstance = null;

    async function loadDashboard() {
      try {
        const [empRes, deptRes, genderRes, jobRes] = await Promise.all([
          fetch(`${BASE}/emps?page=1&pageSize=1`).then(r => r.json()),
          fetch(`${BASE}/depts`).then(r => r.json()),
          fetch(`${BASE}/report/empGenderData`).then(r => r.json()),
          fetch(`${BASE}/report/empJobData`).then(r => r.json()),
        ]);
        dashboardData.empTotal = empRes.data ? empRes.data.total : 0;
        dashboardData.deptTotal = deptRes.data ? deptRes.data.length : 0;

        // 性别图表
        const genderData = genderRes.data || [];
        nextTick(() => {
          const el = document.getElementById('genderChart');
          if (!el) return;
          if (!genderChartInstance) genderChartInstance = echarts.init(el);
          genderChartInstance.setOption({
            tooltip: { trigger: 'item' },
            legend: { bottom: 0 },
            series: [{
              type: 'pie',
              radius: ['40%', '65%'],
              center: ['50%', '45%'],
              data: genderData.map(d => ({ name: d.name, value: d.value })),
              label: { show: true, formatter: '{b}: {c}' },
              emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.5)' } }
            }]
          });
        });

        // 职位图表
        const jobData = jobRes.data || {};
        const jobLabels = jobData.jobList || [];
        const jobValues = jobData.dataList || [];
        nextTick(() => {
          const el = document.getElementById('jobChart');
          if (!el) return;
          if (!jobChartInstance) jobChartInstance = echarts.init(el);
          jobChartInstance.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: jobLabels },
            yAxis: { type: 'value' },
            series: [{ type: 'bar', data: jobValues, itemStyle: { color: '#409eff' }, barWidth: '50%' }]
          });
        });
      } catch (e) {
        console.error('加载仪表盘数据失败', e);
      }
    }

    watch(currentView, (v) => {
      if (v === 'dashboard') {
        nextTick(() => loadDashboard());
      } else if (v === 'emp') {
        loadEmp();
      } else if (v === 'dept') {
        loadDept();
      }
    });

    // ===================== 员工管理 =====================
    const empList = ref([]);
    const empTotal = ref(0);
    const empLoading = ref(false);
    const empQuery = reactive({ page: 1, pageSize: 10, name: '', gender: null, begin: '', end: '' });
    const empDialogVisible = ref(false);
    const empSaving = ref(false);
    const empForm = reactive({
      id: null, username: '', name: '', gender: 1, phone: '',
      job: null, salary: null, image: '', entryDate: null, deptId: null, exprList: []
    });

    function resetEmpForm() {
      empForm.id = null; empForm.username = ''; empForm.name = ''; empForm.gender = 1;
      empForm.phone = ''; empForm.job = null; empForm.salary = null; empForm.image = '';
      empForm.entryDate = null; empForm.deptId = null; empForm.exprList = [];
    }

    function addExpr() {
      empForm.exprList.push({ company: '', job: '', begin: null, end: null });
    }

    function handleUploadSuccess(res) {
      if (res.code === 1) {
        empForm.image = res.data;
        ElementPlus.ElMessage.success('上传成功');
      }
    }

    async function loadEmp() {
      empLoading.value = true;
      try {
        const params = new URLSearchParams();
        params.set('page', empQuery.page);
        params.set('pageSize', empQuery.pageSize);
        if (empQuery.name) params.set('name', empQuery.name);
        if (empQuery.gender) params.set('gender', empQuery.gender);
        if (empQuery.begin) params.set('begin', empQuery.begin);
        if (empQuery.end) params.set('end', empQuery.end);
        const res = await fetch(`${BASE}/emps?${params}`).then(r => r.json());
        if (res.code === 1) {
          empList.value = res.data.rows || [];
          empTotal.value = res.data.total || 0;
        }
      } catch (e) { console.error(e); }
      finally { empLoading.value = false; }
    }

    function searchEmp() { empQuery.page = 1; loadEmp(); }
    function resetEmpSearch() {
      empQuery.name = ''; empQuery.gender = null; empQuery.begin = ''; empQuery.end = '';
      empQuery.page = 1; loadEmp();
    }

    async function openEmpDialog(row) {
      if (!deptList.value.length) await loadDept();
      if (row) {
        try {
          const res = await fetch(`${BASE}/emps/${row.id}`).then(r => r.json());
          if (res.code === 1) {
            const d = res.data;
            empForm.id = d.id; empForm.username = d.username; empForm.name = d.name;
            empForm.gender = d.gender; empForm.phone = d.phone; empForm.job = d.job;
            empForm.salary = d.salary; empForm.image = d.image || '';
            empForm.entryDate = d.entryDate; empForm.deptId = d.deptId;
            empForm.exprList = (d.exprList || []).map(e => ({ ...e }));
          }
        } catch (e) { console.error(e); }
      } else {
        resetEmpForm();
      }
      empDialogVisible.value = true;
    }

    async function saveEmp() {
      if (!empForm.username || !empForm.name) {
        ElementPlus.ElMessage.warning('请填写用户名和姓名');
        return;
      }
      empSaving.value = true;
      try {
        const isEdit = !!empForm.id;
        const body = JSON.stringify(empForm);
        const res = await fetch(`${BASE}/emps`, {
          method: isEdit ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body
        }).then(r => r.json());
        if (res.code === 1) {
          ElementPlus.ElMessage.success(isEdit ? '修改成功' : '新增成功');
          empDialogVisible.value = false;
          loadEmp();
        } else {
          ElementPlus.ElMessage.error(res.msg || '操作失败');
        }
      } catch (e) { ElementPlus.ElMessage.error('操作失败'); }
      finally { empSaving.value = false; }
    }

    async function deleteEmp(id) {
      try {
        await ElementPlus.ElMessageBox.confirm('确定删除该员工？', '提示', {
          confirmButtonText: '确定', cancelButtonText: '取消', type: 'warning'
        });
      } catch { return; }
      try {
        const res = await fetch(`${BASE}/emps?ids=${id}`, { method: 'DELETE' }).then(r => r.json());
        if (res.code === 1) {
          ElementPlus.ElMessage.success('删除成功');
          loadEmp();
        }
      } catch (e) { ElementPlus.ElMessage.error('删除失败'); }
    }

    // ===================== 部门管理 =====================
    const deptList = ref([]);
    const deptLoading = ref(false);
    const deptDialogVisible = ref(false);
    const deptSaving = ref(false);
    const deptForm = reactive({ id: null, name: '' });

    function resetDeptForm() { deptForm.id = null; deptForm.name = ''; }

    async function loadDept() {
      deptLoading.value = true;
      try {
        const res = await fetch(`${BASE}/depts`).then(r => r.json());
        if (res.code === 1) deptList.value = res.data || [];
      } catch (e) { console.error(e); }
      finally { deptLoading.value = false; }
    }

    function openDeptDialog(row) {
      if (row) { deptForm.id = row.id; deptForm.name = row.name; }
      else { resetDeptForm(); }
      deptDialogVisible.value = true;
    }

    async function saveDept() {
      if (!deptForm.name) { ElementPlus.ElMessage.warning('请输入部门名称'); return; }
      deptSaving.value = true;
      try {
        const isEdit = !!deptForm.id;
        const body = JSON.stringify({ id: deptForm.id, name: deptForm.name });
        const res = await fetch(`${BASE}/depts`, {
          method: isEdit ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body
        }).then(r => r.json());
        if (res.code === 1) {
          ElementPlus.ElMessage.success(isEdit ? '修改成功' : '新增成功');
          deptDialogVisible.value = false;
          loadDept();
        } else {
          ElementPlus.ElMessage.error(res.msg || '操作失败');
        }
      } catch (e) { ElementPlus.ElMessage.error('操作失败'); }
      finally { deptSaving.value = false; }
    }

    async function deleteDept(id) {
      try {
        await ElementPlus.ElMessageBox.confirm('确定删除该部门？', '提示', {
          confirmButtonText: '确定', cancelButtonText: '取消', type: 'warning'
        });
      } catch { return; }
      try {
        const res = await fetch(`${BASE}/depts?id=${id}`, { method: 'DELETE' }).then(r => r.json());
        if (res.code === 1) {
          ElementPlus.ElMessage.success('删除成功');
          loadDept();
        }
      } catch (e) { ElementPlus.ElMessage.error('删除失败'); }
    }

    // ===================== 初始化加载 =====================
    onMounted(() => {
      loadDashboard();
      loadDept();
    });

    return {
      currentView, activeMenu, pageTitle, handleMenuSelect,
      jobMap, dashboardData,
      empList, empTotal, empLoading, empQuery, empDialogVisible, empSaving, empForm,
      loadEmp, searchEmp, resetEmpSearch, openEmpDialog, saveEmp, deleteEmp,
      addExpr, handleUploadSuccess,
      deptList, deptLoading, deptDialogVisible, deptSaving, deptForm,
      loadDept, openDeptDialog, saveDept, deleteDept
    };
  }
});

app.use(ElementPlus);
app.mount('#app');
</script>
</body>
</html>
